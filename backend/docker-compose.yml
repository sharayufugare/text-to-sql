version: "3.9"

# ── Full stack: MySQL + Flask backend + React frontend ───────────────────────
services:

  # ── MySQL database ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: nl2sql-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend_mysql/setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    networks:
      - nl2sql-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend_mysql
    container_name: nl2sql-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST:        mysql
      DB_PORT:        3306
      DB_USER:        root
      DB_PASSWORD:    ${DB_PASSWORD}
      DB_NAME:        ${DB_NAME}
      LLM_PROVIDER:   ${LLM_PROVIDER}
      OPENROUTER_KEY: ${OPENROUTER_KEY}
      OPENAI_KEY:     ${OPENAI_KEY}
      ANTHROPIC_KEY:  ${ANTHROPIC_KEY}
      LLM_MODEL:      ${LLM_MODEL}
    ports:
      - "5000:5000"
    networks:
      - nl2sql-net

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: nl2sql-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - nl2sql-net

networks:
  nl2sql-net:
    driver: bridge

volumes:
  mysql_data:
